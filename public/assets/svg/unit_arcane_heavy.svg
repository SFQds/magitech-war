<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 奥术重步 - 帝国重装魔法步兵 -->
  <!-- 重甲靴 -->
  <rect x="16" y="50" width="14" height="10" rx="3" fill="#3a3a5a"/>
  <rect x="34" y="50" width="14" height="10" rx="3" fill="#3a3a5a"/>
  <!-- 腿甲 -->
  <rect x="18" y="38" width="12" height="14" rx="2" fill="#4a4a6a"/>
  <rect x="34" y="38" width="12" height="14" rx="2" fill="#4a4a6a"/>
  <!-- 身体重甲 -->
  <rect x="14" y="18" width="36" height="24" rx="4" fill="#5a5a7a"/>
  <!-- 胸甲符文线 -->
  <line x1="22" y1="24" x2="42" y2="24" stroke="#c8a2c8" stroke-width="1.5" opacity="0.6"/>
  <line x1="22" y1="30" x2="42" y2="30" stroke="#c8a2c8" stroke-width="1.5" opacity="0.5"/>
  <line x1="22" y1="36" x2="42" y2="36" stroke="#c8a2c8" stroke-width="1.5" opacity="0.4"/>
  <!-- 肩甲 -->
  <rect x="8" y="16" width="20" height="8" rx="3" fill="#4a4a6a"/>
  <rect x="36" y="16" width="20" height="8" rx="3" fill="#4a4a6a"/>
  <!-- 头盔 -->
  <rect x="20" y="0" width="24" height="20" rx="5" fill="#3a3a5a"/>
  <!-- 头盔面罩 -->
  <rect x="24" y="6" width="16" height="8" rx="3" fill="#c8a2c8" opacity="0.3"/>
  <!-- 头盔符文 -->
  <circle cx="32" cy="10" r="3" fill="#9b59b6" opacity="0.4"/>
  <!-- 武器：符文重剑 -->
  <rect x="50" y="28" width="4" height="28" rx="2" fill="#888"/>
  <rect x="44" y="32" width="10" height="4" rx="1" fill="#9b59b6" opacity="0.5"/>
  <rect x="44" y="40" width="10" height="4" rx="1" fill="#9b59b6" opacity="0.4"/>
  <!-- 护盾 -->
  <rect x="2" y="22" width="14" height="24" rx="4" fill="#4a4a6a"/>
  <rect x="4" y="26" width="10" height="16" rx="2" fill="#c8a2c8" opacity="0.2"/>
</svg>