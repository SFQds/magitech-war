<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 帝国指挥中心 - 浮空小塔 -->
  <!-- 底座（大地） -->
  <rect x="10" y="100" width="108" height="20" rx="3" fill="#3a3a4a"/>
  <rect x="6" y="96" width="116" height="8" rx="2" fill="#4a4a5a"/>
  <!-- 主体塔身 -->
  <rect x="30" y="38" width="68" height="62" rx="4" fill="#2a2a4a"/>
  <rect x="28" y="36" width="72" height="64" rx="4" fill="none" stroke="#c8a2c8" stroke-width="1.5" opacity="0.5"/>
  <!-- 浮空层 -->
  <rect x="20" y="20" width="88" height="22" rx="4" fill="#3a3a6a"/>
  <!-- 悬浮光带 -->
  <rect x="18" y="18" width="92" height="4" rx="2" fill="#9b59b6" opacity="0.4"/>
  <!-- 塔尖 -->
  <polygon points="64,0 38,24 90,24" fill="#4a4a7a"/>
  <polygon points="64,0 38,24 90,24" fill="none" stroke="#c8a2c8" stroke-width="1"/>
  <!-- 符文辉光 -->
  <rect x="36" y="44" width="56" height="3" rx="1" fill="#9b59b6" opacity="0.3"/>
  <rect x="40" y="52" width="48" height="3" rx="1" fill="#9b59b6" opacity="0.25"/>
  <rect x="44" y="60" width="40" height="3" rx="1" fill="#9b59b6" opacity="0.2"/>
  <!-- 门 -->
  <rect x="54" y="78" width="20" height="22" rx="8" fill="#1a1a2e"/>
  <rect x="56" y="80" width="16" height="18" rx="7" fill="#6a5a8e" opacity="0.6"/>
  <!-- 水晶核心 -->
  <circle cx="64" cy="70" r="6" fill="#9b59b6" opacity="0.4"/>
</svg>