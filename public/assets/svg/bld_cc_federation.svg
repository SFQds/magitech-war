<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 联邦指挥中心 - 红砖厂房 -->
  <!-- 主厂房 -->
  <rect x="8" y="24" width="112" height="88" rx="3" fill="#663322"/>
  <!-- 砖纹 -->
  <line x1="8" y1="38" x2="120" y2="38" stroke="#5a2a1a" stroke-width="1"/>
  <line x1="8" y1="52" x2="120" y2="52" stroke="#5a2a1a" stroke-width="1"/>
  <line x1="8" y1="66" x2="120" y2="66" stroke="#5a2a1a" stroke-width="1"/>
  <line x1="8" y1="80" x2="120" y2="80" stroke="#5a2a1a" stroke-width="1"/>
  <line x1="8" y1="94" x2="120" y2="94" stroke="#5a2a1a" stroke-width="1"/>
  <!-- 屋顶 -->
  <rect x="2" y="12" width="124" height="16" rx="2" fill="#885533"/>
  <rect x="0" y="10" width="128" height="6" rx="1" fill="#997744"/>
  <!-- 烟囱 -->
  <rect x="90" y="0" width="14" height="20" fill="#444"/>
  <rect x="92" y="-2" width="10" height="4" fill="#555"/>
  <!-- 紫烟 -->
  <circle cx="97" cy="-6" r="8" fill="#9b59b6" opacity="0.15"/>
  <circle cx="99" cy="-12" r="6" fill="#9b59b6" opacity="0.1"/>
  <circle cx="95" cy="-16" r="5" fill="#9b59b6" opacity="0.07"/>
  <!-- 窗户 -->
  <rect x="16" y="38" width="18" height="14" rx="2" fill="#ffcc66" opacity="0.35"/>
  <rect x="40" y="38" width="18" height="14" rx="2" fill="#ffcc66" opacity="0.35"/>
  <rect x="64" y="38" width="18" height="14" rx="2" fill="#ffcc66" opacity="0.35"/>
  <rect x="28" y="64" width="18" height="14" rx="2" fill="#ffcc66" opacity="0.25"/>
  <rect x="52" y="64" width="18" height="14" rx="2" fill="#ffcc66" opacity="0.25"/>
  <rect x="76" y="64" width="18" height="14" rx="2" fill="#ffcc66" opacity="0.25"/>
  <!-- 大门 -->
  <rect x="44" y="82" width="40" height="30" rx="4" fill="#3a1a0a"/>
  <!-- 齿轮装饰 -->
  <circle cx="64" cy="60" r="12" fill="none" stroke="#997744" stroke-width="2" opacity="0.5"/>
  <circle cx="64" cy="60" r="6" fill="#997744" opacity="0.3"/>
  <!-- 地面 -->
  <rect x="0" y="110" width="128" height="18" fill="#4a3a2a"/>
</svg>