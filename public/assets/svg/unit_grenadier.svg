<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 掷弹兵 - 轻装步兵+炼金瓶 -->
  <!-- 靴子 -->
  <rect x="20" y="52" width="10" height="8" rx="2" fill="#3a4a30"/>
  <rect x="34" y="52" width="10" height="8" rx="2" fill="#3a4a30"/>
  <!-- 腿 -->
  <rect x="22" y="42" width="8" height="12" fill="#4a5a40"/>
  <rect x="34" y="42" width="8" height="12" fill="#4a5a40"/>
  <!-- 身体 -->
  <rect x="18" y="24" width="28" height="20" rx="3" fill="#557744"/>
  <!-- 弹药带 -->
  <rect x="14" y="28" width="36" height="4" rx="1" fill="#448833"/>
  <!-- 头 -->
  <circle cx="32" cy="14" r="10" fill="#e8c8a0"/>
  <!-- 护目镜 -->
  <rect x="24" y="10" width="16" height="6" rx="3" fill="#334433"/>
  <rect x="26" y="11" width="5" height="4" rx="2" fill="#88ccaa" opacity="0.5"/>
  <rect x="33" y="11" width="5" height="4" rx="2" fill="#88ccaa" opacity="0.5"/>
  <!-- 腰间炼金瓶（左） -->
  <rect x="4" y="34" width="10" height="14" rx="3" fill="#88cc44" opacity="0.7"/>
  <rect x="6" y="32" width="6" height="4" rx="1" fill="#666"/>
  <!-- 腰间炼金瓶（右） -->
  <rect x="50" y="36" width="10" height="12" rx="3" fill="#cc8844" opacity="0.7"/>
  <rect x="52" y="34" width="6" height="4" rx="1" fill="#666"/>
  <!-- 手中掷弹筒 -->
  <rect x="42" y="20" width="18" height="6" rx="2" fill="#666"/>
  <!-- 掷出烟雾 -->
  <circle cx="62" cy="22" r="5" fill="#88cc88" opacity="0.2"/>
  <circle cx="66" cy="18" r="4" fill="#88cc88" opacity="0.15"/>
</svg>